{% extends "base.html" %}

{% block extrahead %}
  <link rel="manifest" href="{{ config.site_url }}assets/manifest.json">
  <link rel="apple-touch-icon" href="{{ config.site_url }}assets/icon-192.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coach4U Resources">
  <meta name="theme-color" content="#003366">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('{{ config.site_url }}sw.js');
      });
    }
  </script>
{% endblock %}
